<!DOCTYPE html>
<html lang="pt" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Budimbo Aristides - {% block title %}{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <!-- Indexação -->
    <meta name="description"
        content="Aristides Budimbo - Engenheiro Informático, Economista e Mentor Estratégico. Especialista em infraestrutura de redes, análise de perfis, liderança de equipas e formação técnica em Angola.">
    <meta name="keywords"
        content="Budimbo Aristides, Engenheiro Informático, Economista, Mentor, Angola, Redes, Liderança, Formação, Consultoria">
    <meta name="author" content="Aristides Budimbo">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="language" content="Portuguese">
    <meta property="og:title" content="Budimbo Aristides Eng. Informático & Economista">
    <meta property="og:description"

    <meta name="twitter:title" content="Budimbo Aristides - Portfólio Profissional">
    <meta name="twitter:description" content="Engenheiro Informático, Economista e Mentor Estratégico">
    <link rel="canonical" href="https://budimboaristides.vercel.com">

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": "Budimbo Aristides",
            "jobTitle": "Engenheiro Informático | Economista | Mentor Estratégico",
            "url": "https://seudominio.com",
            "sameAs": [
                "https://www.linkedin.com/in/budimbo-tshikweji-aristides-88b2a0194/",
                "https://www.instagram.com/tchillz_prata21?igsh=cGx0MDRyeHFscWtj",
                "https://github.com/aristidesbudimbo"
            ],
            "email": "aristide.thidewalla@gmail.com",
            "alumniOf": [
                {
                    "@type": "CollegeOrUniversity",
                    "name": "Engenharia Informática"
                },
                {
                    "@type": "CollegeOrUniversity", 
                    "name": "Economia"
                }
            ],
            "knowsAbout": ["Redes de Computadores", "Liderança de Equipas", "Análise de Perfis", "Gestão de Projetos", "Mentoria"],
            "worksFor": {
                "@type": "Organization",
                "name": "AR21 Consulting",
                "description": "Consultoria em Tecnologia e Gestão"
            },
            "description": "Profissional híbrido que combina engenharia informática, economia e inteligência comportamental para liderar equipas e formar talentos com impacto real em Angola."
        }
        </script>

</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="{{ url_for('index') }}">AR<span class="highlight">21</span></a>
            </div>
            <div class="nav-menu" id="navMenu">

                    <li><a href="{{ url_for('index') }}" class="nav-link">Início</a></li>

                    <li><a href="{{ url_for('projetos') }}" class="nav-link">Projetos</a></li>
                    <li><a href="{{ url_for('conhecimento') }}" class="nav-link">Conhecimento</a></li>

                <button id="downloadCVBtn" class="cv-download-btn" aria-label="Download CV">
